function badge(f){if(f==='existing')return'<span class="ex">Existant</span>';if(f==='priority')return'<span class="pri">Priorite</span>';return '';}
function l3(subs){if(!subs||!subs.length)return'';return'<div class="lvl3">'+subs.map(s=>{const p=s.split(' · ');return`<div class="l3-item">${p[0]}${p[1]?`<span class="l3-url">${p[1]}</span>`:''}</div>`;}).join('')+'</div>';}
function l2(ch){return ch.map(c=>`<div class="l2-item"><span class="l2-dot"></span><span class="l2-title">${c.label}</span>${c.vol?`<span class="vol">${c.vol}</span>`:''}<span class="l2-url">${c.url}</span></div>${l3(c.subs)}`).join('');}
function l1(ch){return ch.map(c=>{const id='l1_'+Math.random().toString(36).slice(2);const h2=c.children&&c.children.length;return`<div class="l1-item" id="${id}"><div class="l1-header" onclick="tog('${id}')"><span class="chevron">&#9658;</span><span class="l1-title">${c.label}</span>${badge(c.flag)}<span class="l1-url">${c.url}</span></div>${h2?`<div class="l1-body"><div class="lvl2">${l2(c.children)}</div></div>`:''}</div>`;}).join('');}
function build(){const tree=document.getElementById('tree');data.forEach(s=>{const id='sec_'+s.id;const hc=s.children&&s.children.length;const el=document.createElement('div');el.className='section';el.id=id;el.innerHTML=`<div class="section-header" onclick="togSec('${id}')"><span class="chevron">&#9658;</span><span class="section-title">${s.label}</span>${s.badge?`<span class="section-badge ${s.badgeCls}">${s.badge}</span>`:''}<span class="section-url">${s.url}</span></div>${hc?`<div class="section-body"><div class="lvl1">${l1(s.children)}</div></div>`:''}`;tree.appendChild(el);});}
function togSec(id){document.getElementById(id).classList.toggle('open');}
function tog(id){document.getElementById(id).classList.toggle('open');}
build();
